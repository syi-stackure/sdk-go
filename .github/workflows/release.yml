name: Release on VERSION bump

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Read version
        id: v
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
      - name: Should release?
        id: gate
        run: |
          if git rev-parse --verify "refs/tags/${{ steps.v.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.v.outputs.tag }} already exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go build ./...
      - name: Source archive
        run: git archive --format=tar.gz -o "sdk-go-${{ needs.check.outputs.tag }}.tar.gz" HEAD
      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "sdk-go-${{ needs.check.outputs.tag }}.tar.gz"
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
      - name: Sign archive
        run: |
          cosign sign-blob --yes \
            --bundle "sdk-go-${{ needs.check.outputs.tag }}.tar.gz.sigstore" \
            "sdk-go-${{ needs.check.outputs.tag }}.tar.gz"
      - name: Create + push tag (last; only if all prior steps passed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.check.outputs.tag }}"
          git push origin "${{ needs.check.outputs.tag }}"
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          files: |
            sdk-go-${{ needs.check.outputs.tag }}.tar.gz
            sdk-go-${{ needs.check.outputs.tag }}.tar.gz.sigstore
          generate_release_notes: true
      - name: Prime Go proxy
        run: |
          module=$(go list -m)
          curl -sSf "https://proxy.golang.org/$module/@v/${{ needs.check.outputs.tag }}.info" > /dev/null
