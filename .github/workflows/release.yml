name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    outputs:
      module: ${{ steps.module.outputs.module }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - run: go build ./...
      - id: module
        run: echo "module=$(go list -m)" >> "$GITHUB_OUTPUT"
      - id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA provenance
    needs: verify
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.verify.outputs.module }}
      upload-assets: true

  attest:
    name: Attest + sign
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Create source archive
        run: git archive --format=tar.gz -o "sdk-go-${{ needs.verify.outputs.tag }}.tar.gz" HEAD
      - name: Attest archive
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "sdk-go-${{ needs.verify.outputs.tag }}.tar.gz"
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign archive (keyless)
        run: cosign sign-blob --yes --output-signature sdk-go-${{ needs.verify.outputs.tag }}.tar.gz.sig --output-certificate sdk-go-${{ needs.verify.outputs.tag }}.tar.gz.pem sdk-go-${{ needs.verify.outputs.tag }}.tar.gz
      - name: Upload signed artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sdk-go-${{ needs.verify.outputs.tag }}.tar.gz
            sdk-go-${{ needs.verify.outputs.tag }}.tar.gz.sig
            sdk-go-${{ needs.verify.outputs.tag }}.tar.gz.pem
          generate_release_notes: true

  prime-proxy:
    name: Prime Go module proxy
    needs: [verify, attest]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch module info
        run: |
          MODULE="${{ needs.verify.outputs.module }}"
          TAG="${{ needs.verify.outputs.tag }}"
          curl -sSf "https://proxy.golang.org/$MODULE/@v/$TAG.info" > /dev/null
