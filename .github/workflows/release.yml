name: Release (date-based auto)

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute date-based version
        id: v
        run: |
          version="1.$(date -u +%Y%m%d).${GITHUB_RUN_NUMBER}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go build ./...
      - name: Source archive
        run: git archive --format=tar.gz -o "sdk-go-${{ steps.v.outputs.tag }}.tar.gz" HEAD
      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "sdk-go-${{ steps.v.outputs.tag }}.tar.gz"
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
      - name: Sign archive
        run: |
          cosign sign-blob --yes \
            --bundle "sdk-go-${{ steps.v.outputs.tag }}.tar.gz.sigstore" \
            "sdk-go-${{ steps.v.outputs.tag }}.tar.gz"
      - name: Create + push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.v.outputs.tag }}"
          git push origin "${{ steps.v.outputs.tag }}"
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          files: |
            sdk-go-${{ steps.v.outputs.tag }}.tar.gz
            sdk-go-${{ steps.v.outputs.tag }}.tar.gz.sigstore
          generate_release_notes: true
      - name: Prime Go proxy
        run: |
          module=$(go list -m)
          curl -sSf "https://proxy.golang.org/$module/@v/${{ steps.v.outputs.tag }}.info" > /dev/null
